syntax = "proto3";
package bps.bps.module.v1;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "github.com/antasena/bps/x/bps/types";

// Module is the config object for the module.
message Module {
  option (cosmos.app.v1alpha1.module) = {go_import: "github.com/antasena/bps/x/bps"};

  // authority defines the custom module authority.
  // If not set, defaults to the governance module.
  string authority = 1;
}
